    \  uploads/tmp/MacOS.Live.Sessions.W.raw.txt\n  uploads/tmp/MacOS.Live.Sessions.Last.raw.txt     (last 20 logins)\n  uploads/tmp/MacOS.Live.Sessions.Id.raw.txt\n\
    \  uploads/tmp/MacOS.Live.Sessions.Groups.raw.txt\n"
  questions:
